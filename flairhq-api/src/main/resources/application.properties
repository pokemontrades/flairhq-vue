spring.application.name=flairhq-api
server.error.include-message=always
spring.profiles.active=${fhq.env}

# Load in Properties file with secrets
spring.config.import=optional:classpath:secrets.properties

# DocumentDB URI
spring.data.mongodb.uri=mongodb://${db_user}:${db_password}@localhost:27017/fapp?authSource=admin

# Reddit OAuth2 — credentials come from secrets.properties
spring.security.oauth2.client.registration.reddit.client-id=${reddit_client_id}
spring.security.oauth2.client.registration.reddit.client-secret=${reddit_client_secret}
spring.security.oauth2.client.registration.reddit.scope=identity
spring.security.oauth2.client.registration.reddit.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.reddit.redirect-uri={baseUrl}/login/oauth2/code/reddit
spring.security.oauth2.client.registration.reddit.client-authentication-method=client_secret_basic

spring.security.oauth2.client.provider.reddit.authorization-uri=https://www.reddit.com/api/v1/authorize
spring.security.oauth2.client.provider.reddit.token-uri=https://www.reddit.com/api/v1/access_token
spring.security.oauth2.client.provider.reddit.user-info-uri=https://oauth.reddit.com/api/v1/me
spring.security.oauth2.client.provider.reddit.user-name-attribute=name

# Frontend origin (used in CORS and post-login redirect)
app.frontend-url=http://localhost:5173

# Service-to-service API key — set service_api_key in secrets.properties
api.service-key=${service_api_key:}

# Session — persisted in MongoDB; no idle timeout; cookie persists for 10 years
server.servlet.session.timeout=0
server.servlet.session.cookie.max-age=15552000

# Discord OAuth2 & Bot — credentials come from secrets.properties
discord.client-id=${discord_client_id}
discord.client-secret=${discord_client_secret}
discord.redirect-host=${app.frontend-url}
discord.server-id=${discord_server_id}
discord.authenticated-role-ids=${discord_authenticated_role_ids}
discord.bot-token=${discord_bot_token}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Reddit API — admin token and user agent come from secrets.properties
reddit.admin-refresh-token=${reddit_admin_refresh_token}
reddit.user-agent=FlairHQ/1.0 by /r/pokemontrades
# Optional: when set, all write operations target this subreddit instead (for local testing)
# reddit.debug-subreddit=
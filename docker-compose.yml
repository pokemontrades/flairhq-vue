services:

  mongodb:
    image: mongo:8
    restart: unless-stopped
    env_file: .env
    volumes:
      - mongodb_data:/data/db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    image: ghcr.io/${GHCR_OWNER}/flairhq-api:latest
    build:
      context: ./flairhq-api
    restart: unless-stopped
    depends_on:
      - mongodb
    env_file: .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  ui:
    image: ghcr.io/${GHCR_OWNER}/flairhq-vue:latest
    build:
      context: ./flairhq-vue
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - ui
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


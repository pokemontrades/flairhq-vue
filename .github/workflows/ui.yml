name: UI

on:
  push:
    branches: [main]
    paths:
      - "flairhq-vue/**"
      - ".github/workflows/ui.yml"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/flairhq-vue

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./flairhq-vue
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  # ── Auto-deploy (disabled) ────────────────────────────────────────────────
